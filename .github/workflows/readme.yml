name: Build readme

on:
  push:
    paths:
      - README-source.adoc
    branches:
      - '**'
  workflow_dispatch:

concurrency:
  group: adoc-build-${{ github.ref }}
  cancel-in-progress: false

jobs:

  build:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Install asciidoctor-reducer
        run: sudo gem install asciidoctor-reducer --pre

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: 'true'

      - name: Reduce readme
        run: asciidoctor-reducer -o README.adoc README-source.adoc

      - name: Add autogenerated header
        run: |
          printf "// THIS FILE IS AUTO-GENERATED.\n// Edit README-source.adoc instead.\n\n" | cat - README.adoc > README.tmp
          mv README.tmp README.adoc

      - name: Commit readme
        uses: EndBug/add-and-commit@v9
        with:
          add: 'README.adoc'
          pull: '--rebase --autostash'
          message: "docs: update generated README [skip ci]"
